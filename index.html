<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAU CET-UG Chapter Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #171717;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede6;
    --muted: #888;
    --faint: #444;
    --bio: #a8d89a;
    --bio-bg: rgba(168,216,154,0.1);
    --chem: #89bff5;
    --chem-bg: rgba(137,191,245,0.1);
    --phy: #c4a8f5;
    --phy-bg: rgba(196,168,245,0.1);
    --high: #f5a889;
    --high-bg: rgba(245,168,137,0.1);
    --mid: #f5d889;
    --mid-bg: rgba(245,216,137,0.1);
    --low: #888;
    --low-bg: rgba(136,136,136,0.08);
    --accent: #f0ede6;
  }

  html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; min-height: 100vh; }

  body { max-width: 780px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

  /* Header */
  .header { margin-bottom: 2.5rem; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; }
  .title-block h1 { font-family: 'Space Mono', monospace; font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; color: var(--text); }
  .title-block p { font-size: 13px; color: var(--muted); margin-top: 6px; font-weight: 300; }
  .reset-btn { font-family: 'Space Mono', monospace; font-size: 11px; background: none; border: 0.5px solid var(--border2); color: var(--muted); padding: 7px 12px; border-radius: 4px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .reset-btn:hover { color: var(--text); border-color: var(--faint); }

  /* Progress */
  .progress-section { margin-bottom: 2rem; }
  .progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .progress-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 2rem; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'Space Mono', monospace; margin-bottom: 6px; }
  .stat-val { font-family: 'Space Mono', monospace; font-size: 1.6rem; font-weight: 700; color: var(--text); line-height: 1; }

  /* Filters */
  .filters-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.75rem; }
  .filter-btn { font-size: 12px; font-family: 'Space Mono', monospace; padding: 6px 13px; border-radius: 3px; border: 0.5px solid var(--border2); background: none; color: var(--muted); cursor: pointer; transition: color 0.15s, background 0.15s, border-color 0.15s; white-space: nowrap; -webkit-font-smoothing: antialiased; }
  .filter-btn:hover { color: var(--text); border-color: var(--faint); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); -webkit-font-smoothing: antialiased; }
  /* Section label */
  .section-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); padding: 0 0 8px; margin-top: 1.5rem; border-bottom: 0.5px solid var(--border); margin-bottom: 4px; }
  .section-label:first-child { margin-top: 0; }

  /* Chapter row */
  .chapter-list { display: flex; flex-direction: column; }
  .chapter-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; border-radius: 4px; }
  .chapter-row:hover { background: var(--surface2); }
  .chapter-row.done { opacity: 0.35; }

  .checkbox { width: 16px; height: 16px; border-radius: 2px; border: 0.5px solid var(--faint); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .chapter-row.done .checkbox { background: var(--text); border-color: var(--text); }
  .checkmark { display: none; width: 10px; height: 10px; }
  .checkmark path { stroke: var(--bg); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .chapter-row.done .checkmark { display: block; }

  .chapter-name { flex: 1; font-size: 13.5px; font-weight: 400; line-height: 1.4; }
  .chapter-row.done .chapter-name { text-decoration: line-through; color: var(--muted); }

  .tags { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
  .tag { font-size: 10px; font-family: 'Space Mono', monospace; padding: 3px 7px; border-radius: 2px; font-weight: 400; }
  .tag-bio { color: var(--bio); background: var(--bio-bg); }
  .tag-chem { color: var(--chem); background: var(--chem-bg); }
  .tag-phy { color: var(--phy); background: var(--phy-bg); }
  .tag-high { color: var(--high); background: var(--high-bg); }
  .tag-mid { color: var(--mid); background: var(--mid-bg); }
  .tag-low { color: var(--low); background: var(--low-bg); }

  .qs { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--faint); flex-shrink: 0; min-width: 38px; text-align: right; }

  /* Empty */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 13px; font-family: 'Space Mono', monospace; }

  /* Celebration */
  @keyframes pop { 0%{transform:scale(0.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
  .celebrate { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--surface); border: 0.5px solid var(--border2); padding: 2rem 2.5rem; border-radius: 8px; text-align: center; z-index: 100; }
  .celebrate.show { display: block; animation: pop 0.3s ease forwards; }
  .celebrate h2 { font-family: 'Space Mono', monospace; font-size: 1.1rem; margin-bottom: 8px; }
  .celebrate p { font-size: 13px; color: var(--muted); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
  .overlay.show { display: block; }

  @media (max-width: 480px) {
    .stats { grid-template-columns: repeat(3,1fr); }
    .stat-val { font-size: 1.2rem; }
    .tags .tag-bio, .tags .tag-chem, .tags .tag-phy { display: none; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeCelebrate()"></div>
<div class="celebrate" id="celebrate">
  <h2>All done.</h2>
  <p>Every chapter checked off.<br>Now go crush the exam.</p>
</div>

<header class="header">
  <div class="header-top">
    <div class="title-block">
      <h1>AAU CET-UG<br>Chapter Tracker</h1>
      <p>BSc Agriculture · Biology · Chemistry · Physics</p>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset all</button>
  </div>

  <div class="progress-section">
    <div class="progress-meta">
      <span class="progress-label">Overall progress</span>
      <span class="progress-count" id="prog-count">0 / 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Done</div><div class="stat-val" id="s-done">0</div></div>
    <div class="stat"><div class="stat-label">Left</div><div class="stat-val" id="s-left">0</div></div>
  </div>
</header>

<div class="filters-row" id="filters">
  <button class="filter-btn active" data-f="all">All</button>
  <button class="filter-btn" data-f="bio">Biology</button>
  <button class="filter-btn" data-f="chem">Chemistry</button>
  <button class="filter-btn" data-f="phy">Physics</button>
  <button class="filter-btn" data-f="high">High priority</button>
  <button class="filter-btn" data-f="mid">Mid priority</button>
  <button class="filter-btn" data-f="low">Low priority</button>
</div>

<div class="chapter-list" id="list"></div>

<script>
const chapters = [
  {name:"Biotechnology: Principles and Processes",sub:"bio",q:"3",pri:"high"},
  {name:"Photosynthesis in Higher Plants",sub:"bio",q:"3",pri:"high"},
  {name:"Molecular Basis of Inheritance",sub:"bio",q:"2–3",pri:"high"},
  {name:"Human Reproduction",sub:"bio",q:"2–3",pri:"high"},
  {name:"Cell – The Unit of Life",sub:"bio",q:"2–3",pri:"high"},
  {name:"Principles of Inheritance & Variation",sub:"bio",q:"2",pri:"mid"},
  {name:"Biomolecules",sub:"bio",q:"2",pri:"mid"},
  {name:"Plant Growth and Development",sub:"bio",q:"2",pri:"mid"},
  {name:"Sexual Reproduction in Flowering Plants",sub:"bio",q:"2",pri:"mid"},
  {name:"Cell Cycle and Cell Division",sub:"bio",q:"2",pri:"mid"},
  {name:"Evolution",sub:"bio",q:"2",pri:"mid"},
  {name:"Organisms and Populations",sub:"bio",q:"2",pri:"mid"},
  {name:"Respiration in Plants",sub:"bio",q:"2",pri:"mid"},
  {name:"Biological Classification",sub:"bio",q:"2",pri:"mid"},
  {name:"Plant Kingdom",sub:"bio",q:"2",pri:"mid"},
  {name:"Chemical Coordination and Integration",sub:"bio",q:"2",pri:"mid"},
  {name:"Human Health and Disease",sub:"bio",q:"1",pri:"low"},
  {name:"Structural Organisation in Animals",sub:"bio",q:"1",pri:"low"},
  {name:"Anatomy of Flowering Plants",sub:"bio",q:"1",pri:"low"},
  {name:"Morphology of Flowering Plant",sub:"bio",q:"1–2",pri:"low"},
  {name:"Animal Kingdom",sub:"bio",q:"1",pri:"low"},
  {name:"Biodiversity and Conservation",sub:"bio",q:"1–2",pri:"low"},
  {name:"Biotechnology and its Applications",sub:"bio",q:"1",pri:"low"},
  {name:"Ecosystem",sub:"bio",q:"1–2",pri:"low"},
  {name:"Reproductive Health",sub:"bio",q:"1",pri:"low"},
  {name:"Locomotion and Movement",sub:"bio",q:"1",pri:"low"},
  {name:"Breathing and Exchange of Gases",sub:"bio",q:"1",pri:"low"},
  {name:"Body Fluids and Circulation",sub:"bio",q:"1",pri:"low"},
  {name:"Excretory Products and their Elimination",sub:"bio",q:"1",pri:"low"},
  {name:"Neural Control and Coordination",sub:"bio",q:"1",pri:"low"},
  {name:"Microbes in Human Welfare",sub:"bio",q:"1",pri:"low"},
  {name:"Chemical Bonding and Molecular Structure",sub:"chem",q:"3–4",pri:"high"},
  {name:"Classification of Elements & Periodicity",sub:"chem",q:"2–3",pri:"high"},
  {name:"Structure of Atom",sub:"chem",q:"2–3",pri:"high"},
  {name:"Thermodynamics",sub:"chem",q:"2–3",pri:"mid"},
  {name:"The d and f Block Elements",sub:"chem",q:"2–3",pri:"mid"},
  {name:"Equilibrium",sub:"chem",q:"2",pri:"mid"},
  {name:"Solutions",sub:"chem",q:"2",pri:"mid"},
  {name:"Electrochemistry",sub:"chem",q:"2",pri:"mid"},
  {name:"Chemical Kinetics",sub:"chem",q:"2",pri:"mid"},
  {name:"Some Basic Concepts of Chemistry",sub:"chem",q:"1–2",pri:"low"},
  {name:"The p-Block Elements",sub:"chem",q:"1–2",pri:"low"},
  {name:"Coordination Compounds",sub:"chem",q:"1–2",pri:"low"},
  {name:"Aldehydes, Ketones and Carboxylic Acids",sub:"chem",q:"1–2",pri:"low"},
  {name:"Biomolecules (Chem)",sub:"chem",q:"1–2",pri:"low"},
  {name:"Hydrocarbons",sub:"chem",q:"1–2",pri:"low"},
  {name:"Haloalkanes and Haloarenes",sub:"chem",q:"1",pri:"low"},
  {name:"Alcohols, Phenols and Ethers",sub:"chem",q:"1",pri:"low"},
  {name:"Amines",sub:"chem",q:"1",pri:"low"},
  {name:"Units and Measurement",sub:"phy",q:"3–4",pri:"high"},
  {name:"Work, Energy and Power",sub:"phy",q:"2–3",pri:"high"},
  {name:"Gravitation",sub:"phy",q:"2–3",pri:"high"},
  {name:"Ray Optics and Optical Instruments",sub:"phy",q:"2–3",pri:"mid"},
  {name:"Current Electricity",sub:"phy",q:"2",pri:"mid"},
  {name:"Electrostatic Potential and Capacitance",sub:"phy",q:"2",pri:"mid"},
  {name:"Semiconductor Electronics",sub:"phy",q:"2",pri:"mid"},
  {name:"Atoms",sub:"phy",q:"2",pri:"mid"},
  {name:"Dual Nature of Radiation and Matter",sub:"phy",q:"2",pri:"mid"},
  {name:"Electromagnetic Waves",sub:"phy",q:"2",pri:"mid"},
  {name:"Laws of Motion",sub:"phy",q:"2",pri:"mid"},
  {name:"Moving Charges and Magnetism",sub:"phy",q:"2",pri:"mid"},
  {name:"Wave Optics",sub:"phy",q:"2",pri:"mid"},
  {name:"Kinetic Theory of Gases",sub:"phy",q:"1–3",pri:"mid"},
  {name:"Systems of Particles & Rotational Motion",sub:"phy",q:"1–2",pri:"low"},
  {name:"Oscillations",sub:"phy",q:"1",pri:"low"},
  {name:"Motion in a Plane",sub:"phy",q:"1–2",pri:"low"},
  {name:"Mechanical Properties of Fluids",sub:"phy",q:"1–2",pri:"low"},
  {name:"Electromagnetic Induction",sub:"phy",q:"1",pri:"low"},
  {name:"Alternating Current",sub:"phy",q:"1",pri:"low"},
  {name:"Magnetism and Matter",sub:"phy",q:"1",pri:"low"},
  {name:"Mechanical Properties of Solids",sub:"phy",q:"1",pri:"low"},
  {name:"Motion in a Straight Line",sub:"phy",q:"1",pri:"low"},
  {name:"Nuclei",sub:"phy",q:"1",pri:"low"},
];

const KEY = 'aau_done_v2';
let done = new Set(JSON.parse(localStorage.getItem(KEY) || '[]'));
let activeFilter = 'all';

function save() { localStorage.setItem(KEY, JSON.stringify([...done])); }

function getFiltered() {
  if (activeFilter === 'all') return chapters;
  if (['bio','chem','phy'].includes(activeFilter)) return chapters.filter(c => c.sub === activeFilter);
  return chapters.filter(c => c.pri === activeFilter);
}

function updateStats(list) {
  const total = list.length;
  const doneCount = list.filter(c => done.has(c.name)).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = doneCount;
  document.getElementById('s-left').textContent = total - doneCount;
  document.getElementById('prog-count').textContent = doneCount + ' / ' + total;
  document.getElementById('prog-fill').style.width = total ? Math.round(doneCount/total*100)+'%' : '0%';
  if (total > 0 && doneCount === total) {
    document.getElementById('celebrate').classList.add('show');
    document.getElementById('overlay').classList.add('show');
  }
}

function render() {
  const list = getFiltered();
  const container = document.getElementById('list');
  container.innerHTML = '';
  if (!list.length) {
    container.innerHTML = '<div class="empty">No chapters match this filter.</div>';
    updateStats(list);
    return;
  }
  const groups = {high:[], mid:[], low:[]};
  list.forEach(c => groups[c.pri].push(c));
  const groupLabel = {high:'— High priority', mid:'— Mid priority', low:'— Low priority'};
  ['high','mid','low'].forEach(pri => {
    if (!groups[pri].length) return;
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = groupLabel[pri];
    container.appendChild(lbl);
    groups[pri].forEach(c => {
      const isDone = done.has(c.name);
      const row = document.createElement('div');
      row.className = 'chapter-row' + (isDone ? ' done' : '');
      row.innerHTML = `
        <div class="checkbox">
          <svg class="checkmark" viewBox="0 0 10 10"><path d="M1.5 5l2.5 3 4.5-6"/></svg>
        </div>
        <span class="chapter-name">${c.name}</span>
        <div class="tags">
          <span class="tag tag-${c.sub}">${c.sub.charAt(0).toUpperCase()+c.sub.slice(1)}</span>
          <span class="tag tag-${c.pri}">${c.pri.charAt(0).toUpperCase()+c.pri.slice(1)}</span>
        </div>
        <span class="qs">${c.q}Q</span>
      `;
      row.addEventListener('click', () => {
        if (done.has(c.name)) done.delete(c.name);
        else done.add(c.name);
        save();
        render();
      });
      container.appendChild(row);
    });
  });
  updateStats(list);
}

function resetAll() {
  if (!confirm('Reset all progress?')) return;
  done.clear();
  save();
  render();
}

function closeCelebrate() {
  document.getElementById('celebrate').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

render();
</script>
</body>
</html>
